<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline – Mail Forge</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #1a3a5c;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        header .logo-text {
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        header .logo-icon {
            width: 36px;
            height: 36px;
            background-color: #1a73e8;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        header .logo-icon svg {
            width: 22px;
            height: 22px;
            fill: #fff;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .offline-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 440px;
            width: 100%;
        }

        .offline-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background-color: #eef2f7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .offline-icon svg {
            width: 40px;
            height: 40px;
            stroke: #1a3a5c;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a3a5c;
            margin-bottom: 0.75rem;
        }

        p {
            font-size: 1rem;
            color: #5a6a7e;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn-retry {
            display: inline-block;
            background-color: #1a73e8;
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.7rem 2rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .btn-retry:hover,
        .btn-retry:focus {
            background-color: #1558b0;
            outline: none;
        }

        footer {
            text-align: center;
            padding: 1.25rem;
            font-size: 0.8rem;
            color: #9aa5b4;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <span class="logo-text">Mail Forge</span>
    </header>

    <main>
        <div class="offline-card">
            <div class="offline-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <line x1="1" y1="1" x2="23" y2="23"/>
                    <path d="M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01"/>
                </svg>
            </div>

            <h1>You're Offline</h1>
            <p>It looks like you've lost your internet connection. Check your network settings and try again.</p>

            <button class="btn-retry" onclick="location.reload()">Try Again</button>
        </div>
    </main>

    <footer>
        &copy; Mail Forge &mdash; Professional Email Marketing Platform
    </footer>
</body>
</html>
